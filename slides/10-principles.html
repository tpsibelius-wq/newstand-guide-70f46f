<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>10 Principles</title>
<link rel="stylesheet" href="../assets/theme.css">
</head>
<body>
<div class="slide-container deep-bg" data-screen-label="10 貫いた思想">

  <!-- 背景装飾 -->
  <div data-object="true" data-object-type="shape" style="position:absolute; right:-300px; top:-300px; width:900px; height:900px; border-radius:999px; border:2px solid rgba(183,227,198,0.1); z-index:1;"></div>
  <div data-object="true" data-object-type="shape" style="position:absolute; left:-200px; bottom:-200px; width:600px; height:600px; border-radius:999px; background:radial-gradient(circle, rgba(240,197,138,0.1), transparent 60%); z-index:1;"></div>

  <div data-object="true" data-object-type="textbox" class="brand-mark" style="z-index:10;">NEWSTAND＋ ／ 舞台裏</div>

  <div data-object="true" data-object-type="textbox" style="position:absolute; left:120px; top:150px; z-index:10;">
    <div class="eyebrow">貫いた思想</div>
  </div>

  <div data-object="true" data-object-type="textbox" class="h2" style="position:absolute; left:120px; top:230px; width:1600px; z-index:10;">
    道具より、<span style="color:#F0C58A;">この考え方</span>が本体です
  </div>

  <!-- 5つの原則カード -->
  <!-- 01 -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:120px; top:490px; width:340px; height:480px; background:rgba(255,255,255,0.06); border:1.5px solid rgba(183,227,198,0.3); border-radius:20px; z-index:5;"></div>
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:150px; top:520px; width:280px; z-index:10;">
    <div style="font-size:96px; font-weight:800; color:#F0C58A; line-height:1; font-variant-numeric:tabular-nums;">01</div>
    <div style="width:60px; height:3px; background:#F0C58A; margin:20px 0 24px;"></div>
    <div style="font-size:30px; font-weight:800; color:#FBF7EC; line-height:1.4;">
      "今の実態"から<br>始める
    </div>
    <div style="margin-top:24px; font-size:18px; font-weight:500; color:#B7E3C6; line-height:1.7;">
      ゼロから設計しない。<br>目の前の業務を素直に見る。
    </div>
  </div>

  <!-- 02 -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:480px; top:490px; width:340px; height:480px; background:rgba(255,255,255,0.06); border:1.5px solid rgba(183,227,198,0.3); border-radius:20px; z-index:5;"></div>
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:510px; top:520px; width:280px; z-index:10;">
    <div style="font-size:96px; font-weight:800; color:#F0C58A; line-height:1;">02</div>
    <div style="width:60px; height:3px; background:#F0C58A; margin:20px 0 24px;"></div>
    <div style="font-size:30px; font-weight:800; color:#FBF7EC; line-height:1.4;">
      なるべく無料で、<br>続く形に
    </div>
    <div style="margin-top:24px; font-size:18px; font-weight:500; color:#B7E3C6; line-height:1.7;">
      月額課金は避ける。<br>止められない仕組みは作らない。
    </div>
  </div>

  <!-- 03 -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:840px; top:490px; width:340px; height:480px; background:rgba(255,255,255,0.06); border:1.5px solid rgba(183,227,198,0.3); border-radius:20px; z-index:5;"></div>
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:870px; top:520px; width:280px; z-index:10;">
    <div style="font-size:96px; font-weight:800; color:#F0C58A; line-height:1;">03</div>
    <div style="width:60px; height:3px; background:#F0C58A; margin:20px 0 24px;"></div>
    <div style="font-size:30px; font-weight:800; color:#FBF7EC; line-height:1.4;">
      使う人にコードを<br>触らせない
    </div>
    <div style="margin-top:24px; font-size:18px; font-weight:500; color:#B7E3C6; line-height:1.7;">
      主役は非技術者。<br>ふだんの道具の中で完結。
    </div>
  </div>

  <!-- 04 -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:1200px; top:490px; width:340px; height:480px; background:rgba(255,255,255,0.06); border:1.5px solid rgba(183,227,198,0.3); border-radius:20px; z-index:5;"></div>
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:1230px; top:520px; width:280px; z-index:10;">
    <div style="font-size:96px; font-weight:800; color:#F0C58A; line-height:1;">04</div>
    <div style="width:60px; height:3px; background:#F0C58A; margin:20px 0 24px;"></div>
    <div style="font-size:30px; font-weight:800; color:#FBF7EC; line-height:1.4;">
      大きな効果は、<br>小さく作る
    </div>
    <div style="margin-top:24px; font-size:18px; font-weight:500; color:#B7E3C6; line-height:1.7;">
      1機能ずつ確かめる。<br>動く実物を積み上げる。
    </div>
  </div>

  <!-- 05 -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:1560px; top:490px; width:260px; height:480px; background:#D08442; border-radius:20px; z-index:5; box-shadow:0 12px 40px rgba(208,132,66,0.3);"></div>
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:1590px; top:520px; width:220px; z-index:10;">
    <div style="font-size:96px; font-weight:800; color:#FBF7EC; line-height:1;">05</div>
    <div style="width:60px; height:3px; background:#FBF7EC; margin:20px 0 24px;"></div>
    <div style="font-size:28px; font-weight:800; color:#FBF7EC; line-height:1.4;">
      外科的に・<br>確かめながら
    </div>
    <div style="margin-top:24px; font-size:18px; font-weight:500; color:#FBF7EC; opacity:0.9; line-height:1.7;">
      切り分けて、<br>影響を見ながら進める。
    </div>
  </div>

  <div data-object="true" data-object-type="textbox" class="page-num" style="z-index:10;">10 / 19</div>
</div>
</body>
</html>
