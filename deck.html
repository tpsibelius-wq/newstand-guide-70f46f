<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>AIを、自分の仕事のどこで使うか ｜ NewStand＋ 事例</title>
<style>
  :root { --deep: #143A28; --paper: #F6F4EC; --mint: #B7E3C6; --s: 1; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--deep);
    font-family: "Yu Gothic UI", "Yu Gothic", "Meiryo", sans-serif;
  }

  /* ステージ：画面いっぱい */
  #stage { position: fixed; inset: 0; overflow: hidden; }

  /* スライドの箱：1920×1080固定。left/top 50% → 自身の半分だけ戻して中央化 → その後スケール。
     中央配置をCSSが保証するので、JSが失敗しても画面外に飛ばない。 */
  #fit {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 1920px;
    height: 1080px;
    transform: translate(-50%, -50%) scale(var(--s));
    transform-origin: center center;
    background: var(--paper);
    box-shadow: 0 20px 70px rgba(0,0,0,.45);
    will-change: transform;
  }
  #frame { width: 1920px; height: 1080px; border: 0; display: block; }

  /* ナビ（左右のクリック領域） */
  .nav {
    position: fixed; top: 0; bottom: 0; width: 12vw; max-width: 150px; z-index: 30;
    border: 0; background: transparent; cursor: pointer; opacity: 0; transition: opacity .18s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav:hover, .nav:focus-visible { opacity: 1; outline: none; }
  .nav.prev { left: 0; } .nav.next { right: 0; }
  .nav span {
    display: grid; place-items: center; width: 52px; height: 52px;
    border-radius: 999px; background: rgba(0,0,0,.5); color: #fff; font-size: 24px; line-height: 1;
  }
  .nav:disabled { cursor: default; }
  .nav:disabled span { opacity: .25; }

  #hud { position: fixed; right: 16px; bottom: 14px; z-index: 40; display: flex; gap: 8px; align-items: center; }
  #hud button, #counter {
    background: rgba(0,0,0,.55); color: var(--paper); border: 0; border-radius: 999px;
    padding: 7px 15px; font-size: 13px; font-weight: 700; letter-spacing: .08em;
    font-variant-numeric: tabular-nums; cursor: pointer;
  }
  #counter { cursor: default; }
  #hint {
    position: fixed; left: 16px; bottom: 14px; z-index: 40; color: #A8C4B0; font-size: 12.5px;
    background: rgba(0,0,0,.55); border-radius: 999px; padding: 7px 15px; transition: opacity .6s;
  }

  /* 一覧（Gキー） */
  #grid {
    position: fixed; inset: 0; z-index: 60; background: rgba(10,26,18,.97); overflow-y: auto;
    padding: 26px; display: none; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px; align-content: start;
  }
  #grid.open { display: grid; }
  #grid .cell {
    position: relative; aspect-ratio: 16 / 9; border: 2px solid transparent; border-radius: 8px;
    overflow: hidden; background: #0C1A12; cursor: pointer; padding: 0;
  }
  #grid .cell:hover, #grid .cell:focus-visible { border-color: var(--mint); outline: none; }
  #grid .cell iframe {
    width: 1920px; height: 1080px; border: 0; pointer-events: none;
    transform: scale(var(--ts, .125)); transform-origin: top left;
  }
  #grid .cell .no {
    position: absolute; left: 6px; bottom: 5px; color: #fff; background: rgba(0,0,0,.7);
    border-radius: 4px; font-size: 11px; padding: 1px 7px; font-weight: 700;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="fit"><iframe id="frame" title="スライド" src="slides/01-cover.html"></iframe></div>
  </div>

  <button class="nav prev" id="prev" aria-label="前のスライド"><span>‹</span></button>
  <button class="nav next" id="next" aria-label="次のスライド"><span>›</span></button>

  <div id="hud">
    <button id="gridBtn" title="一覧 (G)">一覧</button>
    <button id="fsBtn" title="全画面 (F)">全画面</button>
    <span id="counter">01 / 19</span>
  </div>
  <div id="hint">← → でめくる ／ F 全画面 ／ G 一覧</div>

  <div id="grid" aria-label="スライド一覧"></div>

<script>
(function () {
  var PLAYLIST = [
    "01-cover.html",
    "02-pains.html",
    "03-pivot.html",
    "04-fde.html",
    "05-step1-inventory.html",
    "06-step2-focus.html",
    "07-step3-mapping.html",
    "08-step3-tools.html",
    "09-step4-build-small.html",
    "10-principles.html",
    "11-principles-detail.html",
    "12-prompt-anatomy.html",
    "13-prompt-by-ai.html",
    "14-ai-lessons.html",
    "15-free-tips.html",
    "16-result.html",
    "17-screens.html",
    "18-method-summary.html",
    "19-takeaway.html"
  ];
  var W = 1920, H = 1080;
  var root = document.documentElement;
  var frame = document.getElementById('frame');
  var counter = document.getElementById('counter');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');
  var grid = document.getElementById('grid');
  var hint = document.getElementById('hint');
  var i = 0;

  function pad(n) { return (n < 10 ? '0' : '') + n; }

  // 画面に収まる倍率を --s に入れる（中央配置はCSSが担保。ここは倍率のみ）
  function fitScale() {
    var vw = window.innerWidth || root.clientWidth;
    var vh = window.innerHeight || root.clientHeight;
    var s = Math.min(vw / W, vh / H);
    if (!isFinite(s) || s <= 0) s = 1;
    root.style.setProperty('--s', s);
  }

  function show(n, replaceHash) {
    i = Math.max(0, Math.min(PLAYLIST.length - 1, n));
    frame.src = 'slides/' + PLAYLIST[i];
    counter.textContent = pad(i + 1) + ' / ' + pad(PLAYLIST.length);
    prevBtn.disabled = (i === 0);
    nextBtn.disabled = (i === PLAYLIST.length - 1);
    if (replaceHash !== false) {
      try { history.replaceState(null, '', '#' + (i + 1)); } catch (e) {}
    }
  }

  function onKey(e) {
    var k = e.key;
    if (grid.classList.contains('open')) {
      if (k === 'Escape' || (k && k.toLowerCase() === 'g')) { toggleGrid(false); e.preventDefault(); }
      return;
    }
    if (k === 'ArrowRight' || k === 'ArrowDown' || k === 'PageDown' || k === ' ') { show(i + 1); e.preventDefault(); }
    else if (k === 'ArrowLeft' || k === 'ArrowUp' || k === 'PageUp') { show(i - 1); e.preventDefault(); }
    else if (k === 'Home') { show(0); e.preventDefault(); }
    else if (k === 'End') { show(PLAYLIST.length - 1); e.preventDefault(); }
    else if (k && k.toLowerCase() === 'f') { toggleFs(); e.preventDefault(); }
    else if (k && k.toLowerCase() === 'g') { toggleGrid(true); e.preventDefault(); }
  }

  function toggleFs() {
    if (!document.fullscreenElement) {
      if (root.requestFullscreen) root.requestFullscreen().catch(function () {});
    } else if (document.exitFullscreen) {
      document.exitFullscreen();
    }
  }

  var gridBuilt = false;
  function buildGrid() {
    if (gridBuilt) return;
    gridBuilt = true;
    PLAYLIST.forEach(function (name, idx) {
      var cell = document.createElement('button');
      cell.className = 'cell';
      cell.innerHTML = '<iframe src="slides/' + name + '" tabindex="-1" title=""></iframe>' +
                       '<span class="no">' + pad(idx + 1) + '</span>';
      cell.addEventListener('click', function () { show(idx); toggleGrid(false); });
      grid.appendChild(cell);
    });
    sizeThumbs();
  }
  // サムネの縮小率をセルの実幅から正確に決める
  function sizeThumbs() {
    var cells = grid.querySelectorAll('.cell');
    for (var n = 0; n < cells.length; n++) {
      var w = cells[n].clientWidth;
      if (w) cells[n].style.setProperty('--ts', w / W);
    }
  }
  function toggleGrid(open) {
    if (open) { buildGrid(); grid.classList.add('open'); sizeThumbs(); }
    else { grid.classList.remove('open'); }
  }

  prevBtn.addEventListener('click', function () { show(i - 1); });
  nextBtn.addEventListener('click', function () { show(i + 1); });
  document.getElementById('fsBtn').addEventListener('click', toggleFs);
  document.getElementById('gridBtn').addEventListener('click', function () {
    toggleGrid(!grid.classList.contains('open'));
  });
  document.addEventListener('keydown', onKey);
  // iframe内にフォーカスが移ってもキーを効かせる（同一オリジン時）
  frame.addEventListener('load', function () {
    try { frame.contentDocument.addEventListener('keydown', onKey); } catch (e) {}
  });

  window.addEventListener('resize', function () {
    fitScale();
    if (grid.classList.contains('open')) sizeThumbs();
  });
  window.addEventListener('orientationchange', fitScale);
  document.addEventListener('fullscreenchange', fitScale);
  window.addEventListener('load', fitScale);

  fitScale();
  var start = parseInt((location.hash || '#1').replace('#', ''), 10);
  show(isNaN(start) ? 0 : start - 1, false);
  setTimeout(function () { hint.style.opacity = '0'; }, 4500);
})();
</script>
</body>
</html>
